<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>droply — enter PIN</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --border: #1e1e2e;
      --accent: #7c6aff;
      --accent-dim: #4a3faa;
      --text: #e8e6f0;
      --muted: #6b6880;
      --error: #ff6b6b;
      --mono: 'DM Mono', monospace;
      --sans: 'Syne', sans-serif;
    }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    /* Subtle grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(124,106,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124,106,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .logo {
      font-size: 13px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--accent);
      font-family: var(--mono);
      margin-bottom: 2.5rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.8); }
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 360px;
      text-align: center;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 800;
      margin-bottom: 0.4rem;
      letter-spacing: -0.02em;
    }

    .subtitle {
      font-size: 13px;
      color: var(--muted);
      font-family: var(--mono);
      margin-bottom: 2rem;
    }

    /* PIN input row */
    .pin-row {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-bottom: 1.5rem;
    }

    .pin-digit {
      width: 44px;
      height: 56px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-family: var(--mono);
      font-size: 1.5rem;
      font-weight: 500;
      color: var(--text);
      text-align: center;
      caret-color: var(--accent);
      transition: border-color 0.15s, box-shadow 0.15s;
      outline: none;
      -webkit-appearance: none;
    }

    .pin-digit:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(124,106,255,0.15);
    }

    .pin-digit.filled {
      border-color: var(--accent-dim);
      color: var(--accent);
    }

    .error-msg {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--error);
      margin-bottom: 1.2rem;
      padding: 8px 12px;
      background: rgba(255,107,107,0.08);
      border-radius: 8px;
      border: 1px solid rgba(255,107,107,0.2);
    }

    button[type="submit"] {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: var(--sans);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.01em;
      transition: background 0.15s, transform 0.1s;
    }

    button[type="submit"]:hover { background: #8f7fff; }
    button[type="submit"]:active { transform: scale(0.98); }

    .hint {
      margin-top: 1.5rem;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      line-height: 1.6;
    }

    /* Hidden actual input that captures all 6 digits */
    #pin-hidden {
      position: absolute;
      opacity: 0;
      pointer-events: none;
      width: 1px;
      height: 1px;
    }
  </style>
</head>
<body>
  <div class="logo">
    <span class="logo-dot"></span>
    droply
  </div>

  <div class="card">
    <h1>Enter PIN</h1>
    <p class="subtitle">Get the PIN from the sender</p>

    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form method="POST" id="pin-form">
      <div class="pin-row" id="pin-display">
        <input class="pin-digit" maxlength="1" inputmode="numeric" pattern="[0-9]" data-idx="0" autocomplete="off">
        <input class="pin-digit" maxlength="1" inputmode="numeric" pattern="[0-9]" data-idx="1" autocomplete="off">
        <input class="pin-digit" maxlength="1" inputmode="numeric" pattern="[0-9]" data-idx="2" autocomplete="off">
        <input class="pin-digit" maxlength="1" inputmode="numeric" pattern="[0-9]" data-idx="3" autocomplete="off">
        <input class="pin-digit" maxlength="1" inputmode="numeric" pattern="[0-9]" data-idx="4" autocomplete="off">
        <input class="pin-digit" maxlength="1" inputmode="numeric" pattern="[0-9]" data-idx="5" autocomplete="off">
      </div>
      <input type="hidden" name="pin" id="pin-value">
      <button type="submit" id="submit-btn">Connect →</button>
    </form>

    <p class="hint">
      Ask the sender for the 6-digit PIN.<br>
      5 attempts allowed per minute.
    </p>
  </div>

  <script>
    // Wire up the 6 individual digit boxes → hidden combined PIN field
    const digits = document.querySelectorAll('.pin-digit');
    const pinValue = document.getElementById('pin-value');

    digits.forEach((d, i) => {
      d.addEventListener('input', () => {
        d.value = d.value.replace(/\D/g, '').slice(-1);
        if (d.value) {
          d.classList.add('filled');
          if (i < 5) digits[i + 1].focus();
        } else {
          d.classList.remove('filled');
        }
        pinValue.value = Array.from(digits).map(x => x.value).join('');
        // Auto-submit when all 6 filled
        if (pinValue.value.length === 6) {
          setTimeout(() => document.getElementById('pin-form').submit(), 120);
        }
      });

      d.addEventListener('keydown', e => {
        if (e.key === 'Backspace' && !d.value && i > 0) {
          digits[i - 1].focus();
          digits[i - 1].value = '';
          digits[i - 1].classList.remove('filled');
        }
      });
    });

    // Paste support (paste the full PIN)
    document.addEventListener('paste', e => {
      const text = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '').slice(0, 6);
      text.split('').forEach((ch, i) => {
        if (digits[i]) { digits[i].value = ch; digits[i].classList.add('filled'); }
      });
      pinValue.value = text;
      if (text.length === 6) setTimeout(() => document.getElementById('pin-form').submit(), 120);
    });

    digits[0].focus();
  </script>
</body>
</html>
