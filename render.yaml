# render.yaml — droply relay on Render (free tier)
#
# IMPORTANT: Render removed free Redis in 2024.
# This config uses in-memory storage which is fine for testing.
# For production with persistence, add a paid Redis or use Upstash free tier.
#
# Deploy steps:
#   1. Push droply_relay/ folder to GitHub
#   2. render.com → New → Web Service → connect repo
#   3. Render reads this file automatically
#   4. Set RELAY_SECRET env var (or let Render generate it)
#   5. Deploy

services:
  - type: web
    name: droply-relay
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 1 --worker-class gthread --threads 8 --timeout 120 --log-level info
    envVars:
      - key: RELAY_SECRET
        generateValue: true
      - key: SESSION_TTL_SEC
        value: "7200"
      - key: MAX_FILE_SIZE
        value: "2147483648"
    healthCheckPath: /health
    plan: free